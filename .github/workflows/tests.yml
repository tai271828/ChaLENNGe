name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check formatting (black)
        run: uvx black --check . --extend-exclude "context-private|artifacts-run-all-tensorflow"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q
